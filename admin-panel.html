<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Intracking - Master Admin</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #333; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #4338ca; }
        .result { margin-top: 20px; padding: 10px; background: #e0f2fe; border-radius: 4px; font-size: 12px; display: none; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Novo Ateliê 🚀</h2>
        <input type="text" id="tenantName" placeholder="Nome do Ateliê">
        <input type="text" id="adminName" placeholder="Nome do Dono">
        <input type="email" id="email" placeholder="E-mail de Login">
        <input type="password" id="password" placeholder="Senha Provisória">
        <button onclick="criarAtelie()">CRIAR AMBIENTE</button>
        <div id="result" class="result"></div>
    </div>

    <script>
        async function criarAtelie() {
            const data = {
                tenantName: document.getElementById('tenantName').value,
                adminName: document.getElementById('adminName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const btn = document.querySelector('button');
            btn.innerText = 'PROCESSANDO...';

            try {
                const response = await fetch(' https://intracking-crm-atelierpro-95c386fda1d5.herokuapp.com/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const resData = await response.json();
                const div = document.getElementById('result');
                div.style.display = 'block';
                
                if (response.ok) {
                    div.innerHTML = `<strong>✅ SUCESSO!</strong><br><br>
                                    Tenant ID: ${resData.data.tenantId}<br><br>
                                    <a href="${resData.data.accessLink}" target="_blank">Clique aqui para acessar o CRM</a>`;
                } else {
                    div.innerHTML = `❌ Erro: ${resData.error}`;
                }
            } catch (e) {
                alert('Erro ao conectar com o servidor Admin (Porta 3001)');
            } finally {
                btn.innerText = 'CRIAR AMBIENTE';
            }
        }
    </script>
</body>
</html>
