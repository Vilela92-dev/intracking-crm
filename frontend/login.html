<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intracking - Login Ateliê</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="index.css">
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md animate-fadeIn">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 animate-slideIn">Intracking 🧵</h1>
            <p class="text-slate-500 mt-2">Bem-vinda de volta ao seu ateliê</p>
        </div>

        <div id="errorBox" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm">
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                <input type="email" id="email" 
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all"
                    placeholder="exemplo@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input type="password" id="password" 
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all"
                    placeholder="••••••••">
            </div>

            <button onclick="handleLogin()" id="btnSubmit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg shadow-md active:scale-95 transition-all">
                ENTRAR NO SISTEMA
            </button>
        </div>

        <p class="text-center text-slate-400 text-xs mt-8">
            &copy; 2026 Intracking CRM - Gestão para Ateliês
        </p>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnSubmit');
            const errorBox = document.getElementById('errorBox');

            if (!email || !password) {
                showError("Por favor, preencha todos os campos.");
                return;
            }

            // Inicia o estado de carregamento
            btn.innerText = "AUTENTICANDO...";
            btn.disabled = true;
            errorBox.classList.add('hidden');

            try {
                // Chamada para o seu servidor no Heroku
                const response = await fetch('https://intracking-crm-atelierpro-95c386fda1d5.herokuapp.com/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // 1. SALVA OS DADOS (Chave Mestra e o ID do Ateliê)
                    localStorage.setItem('@Intracking:token', result.token);
                    localStorage.setItem('@Intracking:user', JSON.stringify(result.user));

                    // 2. REDIRECIONA
                    alert('Sucesso! Entrando no sistema...');
                    window.location.href = 'dashboard.html'; 
                } else {
                    showError(result.error || "E-mail ou senha inválidos.");
                }

            } catch (err) {
                showError("Não foi possível conectar ao servidor. Verifique sua internet.");
                console.error("Erro de Login:", err);
            } finally {
                btn.innerText = "ENTRAR NO SISTEMA";
                btn.disabled = false;
            }
        }

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
